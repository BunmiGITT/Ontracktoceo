<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="On Track to CEO — Closing the gap between talent and opportunity. Coming soon."/>
  <meta property="og:title" content="On Track to CEO"/>
  <meta property="og:description" content="Closing the gap between talent and opportunity."/>
  <meta property="og:type" content="website"/>
  <title>On Track to CEO — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:   #0D1B2A;
      --navymd: #1A3C5E;
      --gold:   #D4A017;
      --goldlt: #E8C547;
      --white:  #FFFFFF;
      --offwht: #F0EDE8;
      --muted:  #8A9BAD;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Gold top bar */
    .bar-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--gold);
      z-index: 10;
    }

    /* Gold bottom bar */
    .bar-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: var(--gold);
      z-index: 10;
    }

    /* Subtle radial glow */
    .glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(212,160,23,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Main layout */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* Logo mark — ascending circles SVG */
    .logo-mark {
      width: 120px;
      height: 80px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
    }

    /* Company name */
    .company-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.5s;
    }

    .company-name span {
      color: var(--gold);
    }

    /* Gold rule */
    .rule {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 20px auto;
      opacity: 0;
      animation: expandRule 1s ease forwards 0.8s;
    }

    /* Tagline */
    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto 32px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    /* Coming soon block */
    .coming-soon {
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.4s;
    }

    .coming-soon-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .coming-soon-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      line-height: 1.7;
      color: var(--offwht);
      opacity: 0.85;
    }

    /* Email notify */
    .notify {
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.8s;
    }

    .notify-form {
      display: flex;
      gap: 0;
      max-width: 380px;
      margin: 0 auto;
      border: 1px solid rgba(212,160,23,0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    .notify-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .notify-input::placeholder {
      color: var(--muted);
    }

    .notify-btn {
      background: var(--gold);
      border: none;
      padding: 14px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy);
      cursor: pointer;
      transition: background 0.2s ease;
      white-space: nowrap;
    }

    .notify-btn:hover { background: var(--goldlt); }

    .notify-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 0.03em;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: rgba(138,155,173,0.5);
      text-transform: uppercase;
      z-index: 2;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes expandRule {
      from { opacity: 0; width: 0; }
      to   { opacity: 1; width: 60px; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .notify-form { flex-direction: column; border-radius: 4px; }
      .notify-btn  { border-radius: 0; padding: 12px; }
      html, body   { overflow: auto; }
    }
  </style>
</head>
<body>

  <div class="bar-top"></div>
  <div class="bar-bottom"></div>
  <div class="glow"></div>

  <main>

    <!-- Ascending circles logo mark -->
    <svg class="logo-mark" viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg" aria-label="On Track to CEO logo">
      <!-- Three baseline-aligned ascending circles -->
      <circle cx="30"  cy="100" r="24" fill="#1A3C5E"/>
      <circle cx="98"  cy="86"  r="40" fill="#2A6499"/>
      <circle cx="190" cy="66"  r="60" fill="#D4A017"/>
      <!-- Arrow above gold circle -->
      <polygon points="190,0 170,26 210,26" fill="#D4A017"/>
    </svg>

    <!-- Company name -->
    <h1 class="company-name">ON TRACK <span>TO CEO</span></h1>

    <!-- Gold rule -->
    <div class="rule"></div>

    <!-- Tagline -->
    <p class="tagline">Closing the gap between talent and opportunity</p>

    <!-- Divider line -->
    <div class="divider"></div>

    <!-- Coming soon narrative -->
    <div class="coming-soon">
      <p class="coming-soon-label">Coming Soon</p>
      <p class="coming-soon-text">
        We are building the platform that puts talent first.
      </p>
    </div>

    <!-- Email notification -->
    <div class="notify">
      <div class="notify-form">
        <input class="notify-input" type="email" placeholder="your@email.com" aria-label="Email address"/>
        <button class="notify-btn" onclick="handleNotify(this)">Notify Me</button>
      </div>
      <p class="notify-label">Be the first to know when we launch</p>
    </div>

  </main>

  <footer>
    &copy; 2026 On Track to CEO Limited &nbsp;&bull;&nbsp; Registered in England &amp; Wales
  </footer>

  <script>
    function handleNotify(btn) {
      const input = btn.previousElementSibling;
      const email = input.value.trim();
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!re.test(email)) {
        input.style.borderLeft = '2px solid #E74C3C';
        input.focus();
        return;
      }
      input.style.borderLeft = 'none';
      btn.textContent = 'Thank you';
      btn.style.background = '#1A7A4A';
      btn.style.color = '#fff';
      input.value = '';
      input.placeholder = 'We will be in touch';
      input.disabled = true;
      btn.disabled = true;
    }
  </script>

</body>
</html>
